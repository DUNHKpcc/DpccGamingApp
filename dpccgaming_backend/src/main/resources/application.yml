spring:
  application:
    name: dpccgaming_app
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/dpccgaming?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:dpccgaming}
    password: ${DB_PASSWORD}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.dpccgaming.backend
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${SERVER_PORT:8080}

auth:
  jwt:
    secret: ${JWT_SECRET:replace-with-at-least32-char-secret-key}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}

  flyway:
    enabled: true
    baseline-on-migrate: true
